[build-system]
requires = ["scikit-build-core", "fvtk-sdk"]
build-backend = "scikit_build_core.build"

[project]
name = "fvtk-sdk-wrap-test"
version = "1.0.0"
description = "Out-of-tree VTK module compiled and Python-wrapped against the fvtk-sdk"
dependencies = []

[tool.scikit-build]
# The wrapped module is a CPython extension, so let scikit-build-core stamp the
# build interpreter's tag (no abi3 override here): this test builds and imports
# on the same interpreter, which is all the SDK build-capability proof needs.
minimum-version = "0.8.2"
