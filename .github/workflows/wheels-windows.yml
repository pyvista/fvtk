name: wheels-windows

# Windows x86_64 fvtk wheels (CPython cp39-cp313) on windows-latest, MSVC + Ninja.
#
# fvtk's main build (build-fvtk.sh -> nix-shell shell.nix) is Linux/GCC-only and
# nix is not available on GitHub's Windows runners, so this job does NOT use it.
# Instead it drives cmake directly with the MSVC toolchain, mirroring the cmake
# configure/build/wheel steps of build-fvtk.sh minus the nix + Linux-only bits:
#   - toolchain: MSVC `cl` (via ilammy/msvc-dev-cmd) instead of the nix gcc-wrapper
#   - generator: Ninja (single-config; MSVC-aware once vcvars is on PATH)
#   - init-cache: ci/cmake/windows.cmake  ->  fvtk-config/minimal.cmake
#                 (FVTK_FORCE_MSVC routes minimal.cmake's 3-way _FVTK_TOOLCHAIN gate
#                  to the "msvc" branch: /GL+/LTCG, /Gy /Gw, /OPT:REF,ICF and away
#                  from the GCC/gold/Linux flags MSVC `cl`/`link` reject)
#   - render backend: native Win32 WGL (no EGL/OSMesa/X) — matches stock pyvista
#   - Python: actions/setup-python per matrix version drives the .pyd ABI tag
#             directly (no nix python-shim; cibuildwheel is not needed because we
#             configure/build cmake ourselves and run bdist_wheel once per cp).
#   - DLL bundling: delvewheel (VTK vendors all ThirdParty: zlib/png/freetype/
#                   hdf5/glad/... built from source, so the only external runtime
#                   DLLs are the MSVC CRT + pythonXY.dll, both excluded by default).

on:
  # Release-gated: a full cp39-cp313 matrix is too heavy for every push/PR. Runs
  # only on tags (release wheels) and manual dispatch — same gating as
  # wheels-manylinux217 / release-wheel-lto. Push a tag or use the Actions
  # "Run workflow" button to smoke a WIP.
  push:
    tags: ["*"]
  workflow_dispatch:

concurrency:
  group: wheels-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  # The fork ships vtkmodules renamed to the top-level `fvtk` package.
  FVTK_IMPORT_NAME: fvtk
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

jobs:
  windows:
    name: windows-cp${{ matrix.python }}-x86_64
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # cp39-cp313, PyVista's Windows support floor through current.
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          # setup.py derives version/provenance from the VTK root commit.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          # pip cmake (>=3.22,<4.2 known-good pin) + ninja >=1.11 (handles VTK's
          # multi-output wrapper edges). setuptools<81 keeps bdist_wheel available.
          # delvewheel bundles the (few) external runtime DLLs into the wheel.
          python -m pip install "cmake>=3.22,<4.2" ninja "setuptools<81" wheel delvewheel numpy

      - name: Enable MSVC developer environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache (disable if backend unavailable)
        shell: bash
        run: |
          set -uxo pipefail
          if sccache --start-server && sccache --show-stats; then
            echo "SCCACHE_LAUNCHER=sccache" >> "$GITHUB_ENV"
          else
            echo "sccache backend unavailable; building without compiler cache"
            echo "SCCACHE_LAUNCHER=" >> "$GITHUB_ENV"
          fi

      - name: Configure (MSVC + Ninja)
        shell: bash
        run: |
          set -euxo pipefail
          # Mirror build-fvtk.sh's cmake invocation, MSVC-flavoured:
          #   -C ci/cmake/windows.cmake  (-> fvtk-config/minimal.cmake, msvc branch)
          #   cl/cl compilers (vcvars already on PATH via msvc-dev-cmd)
          #   Python3 from setup-python; FIND_STRATEGY=LOCATION so the matrix
          #   interpreter (not a stray system one) sets the .pyd ABI tag.
          cmake -S . -B build -G Ninja \
            -C ci/cmake/windows.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl \
            -DCMAKE_C_COMPILER_LAUNCHER="${SCCACHE_LAUNCHER}" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="${SCCACHE_LAUNCHER}" \
            -DPython3_EXECUTABLE="$(python -c 'import sys;print(sys.executable)')" \
            -DPython3_FIND_STRATEGY=LOCATION

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --parallel
          sccache --show-stats || true

      - name: Wheel (bdist_wheel + delvewheel repair)
        shell: bash
        run: |
          set -euxo pipefail
          python ci/prune_setup_py.py "$PWD/build"
          ( cd build && python setup.py bdist_wheel )
          ls -la build/dist/*.whl
          # VTK vendors all ThirdParty, so the wheel's external DLL deps are just
          # the MSVC CRT + pythonXY.dll (both excluded by default). delvewheel
          # still grafts the in-tree libvtk*.dll load paths and stamps the tag.
          # --add-path build : where the kit DLLs live next to the .pyd modules.
          python -m delvewheel repair \
            --add-path build \
            -w wheelhouse build/dist/*.whl || {
              echo "delvewheel repair failed; uploading the raw bdist wheel" >&2
              mkdir -p wheelhouse && cp build/dist/*.whl wheelhouse/
            }
          ls -la wheelhouse/*.whl

      - name: Smoke test (offscreen, native WGL)
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv venv
          ./venv/Scripts/python -m pip install --upgrade pip numpy
          ./venv/Scripts/python -m pip install wheelhouse/*.whl
          # The fork imports as the `fvtk` package.
          FVTK_IMPORT_NAME="${FVTK_IMPORT_NAME}" ./venv/Scripts/python ci/smoke_test.py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-windows-cp${{ matrix.python }}-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error
