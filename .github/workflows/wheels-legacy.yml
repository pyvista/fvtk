# Legacy versioned-wheel build for CPython 3.10 AND 3.11 (Linux + Windows).
#
# WHY: the shipped wheel is a SINGLE cp312-abi3 wheel (Py_LIMITED_API
# 0x030c0000) that loads on CPython 3.12+. 3.12 is the abi3 floor — PyMemberDef +
# the Py_T_*/Py_READONLY member constants the heap-type wrappers emit only entered
# the stable ABI in 3.12 (gh-93274) — so 3.10/3.11 CANNOT be abi3 and need
# version-specific (non-abi3) wheels. This workflow produces those four wheels:
#   cp310 + cp311  x  Linux(manylinux2014) + Windows.
#
# This is ADDITIVE and DOES NOT touch the cp312-abi3 build/release path (ci.yml,
# wheels-cibuildwheel.yml). The versioned-wheel machinery already exists: when the
# build interpreter is < 3.12 OR FVTK_ABI3=0, fvtk_backend._abi3_enabled() returns
# False and the backend emits a legacy static per-version wheel automatically. So
# selecting cp310/cp311 (plus FVTK_ABI3=0 belt-and-suspenders) yields versioned
# wheels with NO new build logic. cibuildwheel runs each cp leg on its own
# interpreter and runs the in-wheel smoke import (pyproject test-command) per leg,
# so a green run == 4 importable wheels.
#
# Linux target is manylinux2014 (glibc 2.17, CentOS 7, system GCC 10.2.1) so the
# legacy wheels install on the same broad baseline as stock vtk==9.6.2's
# manylinux_2_17 wheels (the shipped abi3 wheel is manylinux_2_28; we deliberately
# go BROADER here for the legacy line). CentOS 7 forces a few toolchain
# accommodations vs the AlmaLinux-8 (manylinux_2_28) defaults baked into
# pyproject [tool.cibuildwheel.linux] — see the Linux job's env below.
name: wheels-legacy

on:
  # MAIN-ONLY build by default: the legacy cp310/cp311 wheels build on every merge
  # to main — like the LTO legs in ci.yml — and via manual dispatch. They do NOT run
  # on PRs by default, so PR latency is unaffected; the slow, lower-priority legacy
  # build is paid only post-merge.
  push:
    branches: [main]
  workflow_dispatch:
  # OPT-IN PR validation: add the `ci:legacy` label to a PR to run the legacy build
  # on that PR (and on every subsequent push while the label stays on). Use this to
  # validate changes that touch the legacy wheel path (e.g. the data_model module
  # shim) BEFORE merge, instead of finding out post-merge. The per-job `if` below
  # gates execution on the label being present, so unrelated `labeled` events (any
  # other label) are no-ops.
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: wheels-legacy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Linux: manylinux2014 (CentOS 7 / glibc 2.17 / GCC 10.2.1), cp310 + cp311,
  # version-specific (non-abi3) wheels.
  # =========================================================================
  linux:
    name: legacy linux (manylinux2014, cp310+cp311)
    # On PRs, run only when the `ci:legacy` label is present; push/dispatch always run.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:legacy')
    # Two non-abi3 cp legs compiled back-to-back → heavy. Blacksmith 16-vcpu when
    # FVTK_RUNNER_LINUX is set, else github ubuntu-latest. The manylinux2014
    # container build width auto-tracks the runner cores.
    runs-on: ${{ vars.FVTK_RUNNER_LINUX || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # VTK derives its version from full history

      - name: Build wheels + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          # Version-specific wheels for 3.10 + 3.11 (each builds + tests on its
          # own interpreter; no abi3 dedup). musllinux skipped (Alpine not a
          # target; the mesa stack below is yum/CentOS only).
          CIBW_BUILD: "cp310-* cp311-*"
          CIBW_SKIP: "*-musllinux_*"
          # Broader baseline than the shipped abi3 wheel (manylinux_2_28):
          # manylinux2014 == CentOS 7 == glibc 2.17, matching stock vtk's wheels.
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
          CIBW_ARCHS_LINUX: "x86_64"
          # OVERRIDE the pyproject before-all (which is AlmaLinux-8/dnf specific and
          # installs mold+lld that do NOT exist on CentOS 7). On el7 we use yum,
          # drop mold/lld, and rely on the gold linker (see FVTK_FAST_LINKER below).
          # EPEL is enabled first because xorg-x11-server-Xvfb + a couple of the
          # mesa devel packages live there on CentOS 7.
          CIBW_BEFORE_ALL_LINUX: >-
            yum install -y epel-release &&
            yum install -y
            mesa-libGL-devel mesa-libEGL-devel mesa-libOSMesa-devel
            mesa-libGLU-devel libglvnd-devel
            libX11-devel libXcursor-devel libXt-devel libXext-devel
            mesa-dri-drivers xorg-x11-server-Xvfb ccache git &&
            mkdir -p /ccache && chmod 0777 /ccache
          # Reuse the portable before-build (pip cmake>=3.22 + ninja>=1.11; el7's
          # ninja 1.10 can't do VTK's multiple-output wrapping edges).
          CIBW_BEFORE_BUILD_LINUX: "{project}/ci/cibw/before-build.sh"
          # Toolchain accommodations for CentOS 7 / GCC 10.2.1:
          #   FVTK_ABI3=0          belt-and-suspenders; the < 3.12 interpreter
          #                        already disables abi3, this makes it explicit so
          #                        the backend takes the legacy per-version path.
          #   FVTK_FAST_LINKER=gold the build defaults to mold (absent on el7);
          #                        el7 binutils ships gold, so pin it explicitly
          #                        rather than rely on the cmake mold->gold
          #                        fallback. gold only ARRANGES objects (no FP
          #                        codegen change) and implements --icf=all.
          #   FVTK_LTO unset       KEEP LTO (-flto=auto, supported on GCC 10). If
          #                        the old-toolchain LTO link fails/times out, set
          #                        FVTK_LTO=0 here and rebuild (explicitly OK'd).
          #   -O3 KEPT             FVTK_GATE_O2 left unset => -O3 (works on GCC 10).
          #   -fno-semantic-interposition + hidden visibility: default-on, GCC 10 OK.
          #   The GCC>=12-gated unity (FVTK_SOURCE_UNITY) + array-TU split auto-
          #   disable on GCC 10.2.1 — expected and fine.
          CIBW_ENVIRONMENT_LINUX: >-
            FVTK_ABI3=0
            FVTK_FAST_LINKER=gold
            CCACHE_DIR=/ccache
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_MAXSIZE=30G
          # Default repair stamps manylinux_2_28 (pyproject); legacy wheels are
          # manylinux2014, so repair with the matching plat.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --plat manylinux2014_x86_64 -w {dest_dir} {wheel}"

      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-legacy-linux
          path: wheelhouse/*.whl
          if-no-files-found: error

  # =========================================================================
  # Windows: MSVC, cp310 + cp311, version-specific wheels. The abi3 python3.lib
  # link logic in fvtk_backend no-ops when abi3 is off, so versioned Windows
  # builds are simpler than the abi3 one (no LIB / python3.lib gymnastics).
  # =========================================================================
  windows:
    name: legacy windows (cp310+cp311)
    # On PRs, run only when the `ci:legacy` label is present; push/dispatch always run.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:legacy')
    runs-on: ${{ vars.FVTK_RUNNER_WINDOWS || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Put MSVC (cl.exe) + the Windows SDK on PATH for the whole job. The Ninja
      # generator does NOT auto-run vcvars; ci/cmake/windows.cmake pins
      # CMAKE_CXX_COMPILER=cl, so cl must be discoverable (same as ci.yml).
      - name: Set up MSVC (vcvars) for the Ninja build
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build wheels + smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp310-* cp311-*"
          # CIBW_ENVIRONMENT REPLACES (does not merge with) the pyproject
          # [tool.cibuildwheel.windows.environment] table, so we MUST re-declare the
          # Windows build vars here or they are lost:
          #   FVTK_CMAKE_INIT=ci/cmake/windows.cmake — selects the MSVC init-cache.
          #     Without it the backend defaults to ci/cmake/linux.cmake, which lacks
          #     windows.cmake's MSVC link-closure restore (vtkCameraNode/vtkLightNode/
          #     vtkDiscretizableColorTransferFunction are referenced by kept code but
          #     trimmed by FVTK_NOCOMPILE_CLASSES) -> the vtkRendering kit DLL fails
          #     to link (LNK2001/LNK1120). windows.cmake re-adds them to the compiled
          #     set; linux.cmake does not (GNU/gold gc-sections elides the dead path).
          #   FVTK_FORCE_MSVC=ON — makes minimal.cmake's toolchain gate take the MSVC
          #     branch (an -C file runs before the compiler probe, so WIN32 isn't set).
          #   FVTK_ABI3=0 — belt-and-suspenders; < 3.12 already disables abi3, make the
          #     legacy per-version static path explicit.
          # delvewheel repair + smoke_min test-command come from the pyproject
          # [tool.cibuildwheel.windows] table (those keys are not part of the env
          # table, so they are NOT clobbered). The abi3-only test-skip (cp313/cp314)
          # is irrelevant — we build only cp310/cp311, each tested on its own interp.
          CIBW_ENVIRONMENT: "FVTK_ABI3=0 FVTK_CMAKE_INIT=ci/cmake/windows.cmake FVTK_FORCE_MSVC=ON"

      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-legacy-windows
          path: wheelhouse/*.whl
          if-no-files-found: error
