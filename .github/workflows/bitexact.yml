# DRAFT — nix-free replacement for bitexact.yml. Marked .draft.
#
# Asserts fvtk compute output is BYTE-FOR-BYTE identical to stock VTK 9.6.2.
# Build the cp313 wheel in the manylinux2014 container (LTO off), then run the
# bit-exact suite with BOTH backends self-contained:
#   * stock: pip install vtk==9.6.2 (self-contained manylinux wheel)
#   * fvtk : the auditwheel-repaired container wheel (self-contained) + the
#            vtkmodules->fvtk shim
# NO nix, NO LD_LIBRARY_PATH: both wheels carry their own runtime libs.
name: bit-exact regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bitexact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: build fvtk wheel (manylinux2014, no nix)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    env:
      PYBIN: /opt/python/cp313-cp313/bin
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "20G"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install build deps
        run: |
          set -euxo pipefail
          yum install -y \
            mesa-libGL-devel mesa-libEGL-devel mesa-libOSMesa-devel \
            mesa-libGLU-devel libglvnd-devel \
            libX11-devel libXcursor-devel libXt-devel libXext-devel ccache git
          "$PYBIN/python" -m pip install --upgrade pip
          "$PYBIN/python" -m pip install "cmake>=3.22,<4.2" "ninja>=1.11" "setuptools<81" wheel auditwheel
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: fvtk-ccache-bitexact-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-bitexact-
            fvtk-ccache-m217-
      - name: Build wheel (LTO off)
        run: |
          set -euxo pipefail
          export PATH="$PYBIN:$PATH"
          FVTK_LTO=0 cmake -S . -B build -G Ninja -C ci/cmake/linux.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPython3_EXECUTABLE="$PYBIN/python" -DPython3_FIND_STRATEGY=LOCATION
          FVTK_LTO=0 cmake --build build --parallel "$(nproc)"
          python ci/prune_setup_py.py "$PWD/build"
          ( cd build && python setup.py bdist_wheel )
          mkdir -p dist-out
          auditwheel repair --plat manylinux_2_17_x86_64 -w dist-out build/dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-bitexact
          path: dist-out/*.whl
          if-no-files-found: error

  bitexact:
    name: fvtk == stock VTK 9.6.2 (bit-exact)
    needs: build-wheel
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    env:
      PYBIN: /opt/python/cp313-cp313/bin
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: fvtk-wheel-bitexact
          path: dist-out

      # Both backends self-contained in the container -> no LD_LIBRARY_PATH.
      - name: Create stock-VTK venv (vtk==9.6.2, numpy==2.4.6)
        run: |
          set -euxo pipefail
          "$PYBIN/python" -m venv /tmp/stock
          /tmp/stock/bin/pip -q install --upgrade pip
          /tmp/stock/bin/pip -q install "numpy==2.4.6" "vtk==9.6.2"
          /tmp/stock/bin/python -c "import vtk; print('stock VTK', vtk.vtkVersion.GetVTKVersion())"

      - name: Create fvtk venv (wheel + shim + numpy==2.4.6)
        run: |
          set -euxo pipefail
          "$PYBIN/python" -m venv /tmp/fvtk
          /tmp/fvtk/bin/pip -q install --upgrade pip
          /tmp/fvtk/bin/pip -q install "numpy==2.4.6"
          /tmp/fvtk/bin/pip -q install "$(ls dist-out/*.whl)"
          SP="$(/tmp/fvtk/bin/python -c 'import sysconfig;print(sysconfig.get_paths()["purelib"])')"
          cp tools/fvtk_shim.py "$SP/_fvtk_shim.py"
          echo "import _fvtk_shim" > "$SP/_fvtk_shim.pth"
          /tmp/fvtk/bin/python -c "from vtkmodules.vtkCommonCore import vtkVersion; print('fvtk VTK', vtkVersion.GetVTKVersion())"

      - name: Create runner venv (pytest + numpy==2.4.6)
        run: |
          "$PYBIN/python" -m venv /tmp/runner
          /tmp/runner/bin/pip -q install --upgrade pip "numpy==2.4.6" pytest

      - name: Run bit-exact suite (fvtk vs stock VTK 9.6.2)
        env:
          BITEXACT_STOCK_PY: /tmp/stock/bin/python
          BITEXACT_FVTK_PY: /tmp/fvtk/bin/python
          BITEXACT_STOCK_LDLP: ""
          BITEXACT_FVTK_LDLP: ""
          BITEXACT_OUTDIR: /tmp/bitexact-out
        run: |
          cd tests/bitexact
          /tmp/runner/bin/python -m pytest -v --tb=short

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-output
          path: /tmp/bitexact-out
          if-no-files-found: ignore
