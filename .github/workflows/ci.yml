# DRAFT — nix-free replacement for ci.yml's per-PR smoke gate. Marked .draft.
#
# Builds the minimal PyVista-parity fvtk cp313 wheel INSIDE the manylinux2014
# container (glibc 2.17, GCC 10.2.1 + gold, el7 yum mesa) and smoke-tests it.
# NO nix: the container wheel is auditwheel-self-contained, so the LD_LIBRARY_PATH
# dance the old nix job needed is gone. LTO off for fast PR feedback (the release
# wheel + LTO is wheels-cibuildwheel.yml / wheels-manylinux217.yml, tag-gated).
#
# This whole job runs in ONE container (`container:`), so ccache (mounted via the
# actions/cache step) warms the python-independent C++ across PRs.
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    tags: ["*"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-smoke:
    name: build + smoke (manylinux2014, no nix)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    env:
      PYBIN: /opt/python/cp313-cp313/bin
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "20G"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install el7 rendering + build deps (system mesa + xvfb + ccache)
        run: |
          set -euxo pipefail
          yum install -y \
            mesa-libGL-devel mesa-libEGL-devel mesa-libOSMesa-devel \
            mesa-libGLU-devel libglvnd-devel \
            libX11-devel libXcursor-devel libXt-devel libXext-devel \
            mesa-dri-drivers xorg-x11-server-Xvfb ccache git
          "$PYBIN/python" -m pip install --upgrade pip
          "$PYBIN/python" -m pip install "cmake>=3.22,<4.2" "ninja>=1.11" "setuptools<81" wheel auditwheel

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: fvtk-ccache-m217-${{ github.sha }}
          restore-keys: fvtk-ccache-m217-

      - name: Build minimal wheel (LTO off — fast PR gate)
        run: |
          set -euxo pipefail
          export PATH="$PYBIN:$PATH"
          FVTK_LTO=0 cmake -S . -B build -G Ninja \
            -C ci/cmake/linux.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPython3_EXECUTABLE="$PYBIN/python" \
            -DPython3_FIND_STRATEGY=LOCATION
          FVTK_LTO=0 cmake --build build --parallel "$(nproc)"
          python ci/prune_setup_py.py "$PWD/build"
          ( cd build && python setup.py bdist_wheel )
          auditwheel repair --plat manylinux_2_17_x86_64 -w wheelhouse build/dist/*.whl
          ls -la wheelhouse/*.whl

      # Hard gate: import + compute on a clean venv (wheel is self-contained).
      - name: Smoke — import + compute + WebCore
        run: |
          set -euxo pipefail
          "$PYBIN/python" -m venv /tmp/v
          . /tmp/v/bin/activate
          pip install --upgrade pip numpy
          pip install wheelhouse/*.whl
          python - <<'PY'
          import numpy as np, fvtk
          from fvtk.vtkCommonCore import vtkVersion
          print("VTK", vtkVersion.GetVTKVersion())
          from fvtk.vtkWebCore import vtkWebApplication  # restored module
          from fvtk.util.numpy_support import numpy_to_vtk, vtk_to_numpy
          a = np.arange(30, dtype=np.float64).reshape(10, 3)
          assert np.allclose(a, vtk_to_numpy(numpy_to_vtk(a)))
          from fvtk.vtkFiltersSources import vtkSphereSource
          from fvtk.vtkFiltersCore import vtkTriangleFilter
          s = vtkSphereSource(); s.SetThetaResolution(16); s.SetPhiResolution(16)
          t = vtkTriangleFilter(); t.SetInputConnection(s.GetOutputPort()); t.Update()
          assert t.GetOutput().GetNumberOfCells() > 0
          print("import + compute + WebCore OK")
          PY

      - name: Smoke — offscreen EGL/OSMesa render (xvfb)
        run: |
          set -euxo pipefail
          . /tmp/v/bin/activate
          FVTK_IMPORT_NAME=fvtk xvfb-run -a -s "-screen 0 1280x1024x24" python ci/smoke_test.py

      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-cp313-manylinux217
          path: wheelhouse/*.whl
          if-no-files-found: error
