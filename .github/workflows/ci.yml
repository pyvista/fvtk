name: CI

# Build the minimal PyVista-parity fvtk wheel (FVTK_ICF on) on the default
# GitHub-hosted Ubuntu runner and smoke-test it. The build uses the same
# shell.nix toolchain as local dev, so the only host requirement is nix.
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: build + smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # VTK records upstream provenance in the root commit; keep full history
          # so version/provenance derivation in setup.py behaves.
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          # shell.nix uses <nixpkgs>; pin it to a channel that ships python313.
          nix_path: nixpkgs=channel:nixos-25.05

      # Warm ccache across runs so only the first build pays the full cost.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/fvtk-ccache
          key: fvtk-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-${{ runner.os }}-

      - name: Build minimal wheel (smoke gate — LTO off for fast feedback)
        run: |
          # Per-push/PR gate: validate the build + smoke quickly. LTO/PGO are
          # release levers (see release-wheel-pgo job), too slow for every push.
          FVTK_LTO=0 FVTK_STRIP=1 BUILD_JOBS="$(nproc)" ./build-fvtk.sh
          WHEEL="$(ls "$PWD"/build-fvtk/dist/*.whl)"
          echo "WHEEL=$WHEEL" >> "$GITHUB_ENV"
          ls -la "$WHEEL"

      # Hard gate: the wheel imports and the compute path works on a clean box.
      - name: Smoke — import + compute
        run: |
          cat > /tmp/smoke_min.py <<'PY'
          import numpy as np, fvtk
          from fvtk.vtkCommonCore import vtkVersion
          print("VTK", vtkVersion.GetVTKVersion())
          from fvtk.util.numpy_support import numpy_to_vtk, vtk_to_numpy
          a = np.arange(30, dtype=np.float64).reshape(10, 3)
          assert np.allclose(a, vtk_to_numpy(numpy_to_vtk(a))), "numpy roundtrip"
          from fvtk.vtkFiltersSources import vtkSphereSource
          from fvtk.vtkFiltersCore import vtkTriangleFilter
          s = vtkSphereSource(); s.SetThetaResolution(16); s.SetPhiResolution(16)
          t = vtkTriangleFilter(); t.SetInputConnection(s.GetOutputPort()); t.Update()
          assert t.GetOutput().GetNumberOfCells() > 0, "empty pipeline"
          print("import + compute OK; cells", t.GetOutput().GetNumberOfCells())
          PY
          nix-shell shell.nix --run '
            # Put nix input libs (mesa, zlib, ...) + gcc libstdc++ on the loader
            # path so the wheel + numpy import. Derived, not machine-specific.
            for p in $buildInputs; do LD_LIBRARY_PATH="$p/lib:$LD_LIBRARY_PATH"; done
            LD_LIBRARY_PATH="$(dirname "$(g++ -print-file-name=libstdc++.so.6)"):$LD_LIBRARY_PATH"
            export LD_LIBRARY_PATH
            python3.13 -m venv /tmp/sv
            /tmp/sv/bin/python -m pip -q install --upgrade pip numpy
            /tmp/sv/bin/python -m pip -q install "$WHEEL"
            /tmp/sv/bin/python /tmp/smoke_min.py
          '

      # Best-effort: full smoke incl. EGL offscreen render via mesa software
      # rasterizer. Headless GL on a hosted runner is finicky, so this is
      # informational and does not gate the build (render is validated locally).
      - name: Smoke — EGL render (best-effort)
        continue-on-error: true
        run: |
          nix-shell shell.nix --run '
            for p in $buildInputs; do LD_LIBRARY_PATH="$p/lib:$LD_LIBRARY_PATH"; done
            LD_LIBRARY_PATH="$(dirname "$(g++ -print-file-name=libstdc++.so.6)"):$LD_LIBRARY_PATH"
            export LD_LIBRARY_PATH
            export LIBGL_ALWAYS_SOFTWARE=1 GALLIUM_DRIVER=llvmpipe EGL_PLATFORM=surfaceless
            export VTK_DEFAULT_OPENGL_WINDOW=vtkEGLRenderWindow VTK_EGL_DEVICE_INDEX=0
            /tmp/sv/bin/python smoke-fvtk.py
          '

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-ubuntu-latest
          path: build-fvtk/dist/*.whl
          if-no-files-found: error

  # Profile-guided release wheel: instrument -> train on PyVista's hot paths ->
  # rebuild. ~+15% runtime and -24% size vs untuned -O3, but ~3x build time, so
  # it runs only on tags / manual dispatch, not every push.
  release-wheel-pgo:
    name: PGO release wheel (ubuntu-latest)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/fvtk-ccache
          key: fvtk-ccache-pgo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-pgo-${{ runner.os }}-

      - name: PGO build (instrument → train → rebuild)
        run: |
          JOBS="$(nproc)" ./ci/pgo-build.sh
          WHEEL="$(ls "$PWD"/build-fvtk-pgo/dist/*.whl)"
          echo "WHEEL=$WHEEL" >> "$GITHUB_ENV"
          ls -la "$WHEEL"

      - name: Smoke — import + compute (PGO wheel)
        run: |
          cat > /tmp/smoke_pgo.py <<'PY'
          import numpy as np, fvtk
          from fvtk.vtkCommonCore import vtkVersion
          print("VTK", vtkVersion.GetVTKVersion())
          from fvtk.util.numpy_support import numpy_to_vtk, vtk_to_numpy
          a = np.arange(30, dtype=np.float64).reshape(10, 3)
          assert np.allclose(a, vtk_to_numpy(numpy_to_vtk(a))), "numpy roundtrip"
          from fvtk.vtkFiltersCore import vtkContourFilter  # the PGO-tuned path
          from fvtk.vtkImagingCore import vtkImageData  # noqa: F401
          print("PGO wheel import + compute OK")
          PY
          nix-shell shell.nix --run '
            for p in $buildInputs; do LD_LIBRARY_PATH="$p/lib:$LD_LIBRARY_PATH"; done
            LD_LIBRARY_PATH="$(dirname "$(g++ -print-file-name=libstdc++.so.6)"):$LD_LIBRARY_PATH"
            export LD_LIBRARY_PATH
            python3.13 -m venv /tmp/sv-pgo
            /tmp/sv-pgo/bin/python -m pip -q install --upgrade pip numpy
            /tmp/sv-pgo/bin/python -m pip -q install "$WHEEL"
            /tmp/sv-pgo/bin/python /tmp/smoke_pgo.py
          '

      - name: Upload PGO wheel
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-pgo-ubuntu-latest
          path: build-fvtk-pgo/dist/*.whl
          if-no-files-found: error
