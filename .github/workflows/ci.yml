# CI gate — runs on every PR to main AND on every push to main. The Linux build
# leg, the two Linux-only numeric gates, AND the macOS/Windows build legs all run
# on every PR (the all-OS legs are no longer main-only — see build-other-os). We
# accept slower PRs to guarantee a non-Linux build break can never land on main.
# Jobs:
#
#   build (linux)   : cibuildwheel builds the SINGLE cp312-abi3 wheel in the
#              manylinux_2_28 (glibc 2.28, AlmaLinux 8, GCC 14.2.1) container and
#              runs the in-container offscreen smoke (pyproject [tool.cibuildwheel]
#              test-command). Python 3.11 has been dropped (maintainer directive):
#              the wheel is a single Py_LIMITED_API 0x030c0000 abi3 wheel tagged
#              cp312-abi3 that loads on CPython 3.12+. cibuildwheel's abi3 dedup
#              means the cp312-* cp313-* cp314-* selectors yield exactly ONE build
#              and ONE wheel. cibuildwheel handles host-checkout -> build in the
#              container -> auditwheel repair (--plat manylinux_2_28_x86_64), so we
#              don't hand-roll any docker. Uploads fvtk-wheels-linux-cp312abi3.
#              GCC 14 activates the GCC>=12-gated unity + array-split build-time
#              levers that are inert on the old manylinux2014/GCC-10.2.1 image.
#   build (macos/windows) : the build-other-os matrix — one job per OS (macos-14,
#              windows-latest), each running the cp312+ abi3 build through
#              cibuildwheel on a native runner and the in-cibuildwheel smoke. Runs
#              on EVERY PR (and push-to-main + workflow_dispatch) so AppleClang/MSVC
#              build breaks are caught BEFORE merge, not after. Per-OS ccache keeps
#              the warm cost bounded (keyed fvtk-cibw-ccache-<os>)
#              shares the python-independent C++ across runs. Each OS uploads
#              fvtk-wheels-<os> (a DISJOINT artifact prefix from the Linux gate).
#   bitexact : install the cp312-abi3 LINUX wheel on the host (per-python via
#              setup-python) alongside stock vtk==9.6.2 and assert byte-for-byte
#              identical output (maxULP=0). No container — only the build needs old
#              glibc; the wheel runs anywhere >= glibc 2.28. ABI3-AWARE parity
#              (BITEXACT_ABI3=1): only type __flags__ HEAPTYPE/IMMUTABLETYPE
#              diverges; numpy zero-copy preserved. Matrixed over py3.12 + py3.13
#              (both install the one abi3 wheel). stock vtk==9.6.2 only ships Linux
#              wheels, so this gate is Linux-only.
#   renderexact : same idea for the RENDERING pipeline (tests/renderexact). Renders
#              the scenes offscreen via vtkEGLRenderWindow under stock vtk and fvtk
#              through the SAME host Mesa software GL (llvmpipe) and asserts
#              pixel-for-pixel identical RGBA + Z framebuffers. A sibling of bitexact
#              (reuses the Linux build artifact). Run on py3.13 (the abi3 wheel);
#              render output is wheel-format-independent. Linux-only (same stock-vtk
#              reason).
#   build-lto / bitexact-lto / renderexact-lto : MAIN-ONLY legs (skipped on PRs
#              via `if: github.event_name != 'pull_request'`). They rebuild the
#              Linux wheel in the SHIPPED config (-flto=auto + -O3, both FVTK_LTO
#              and FVTK_GATE_O2 unset) and re-run the byte-for-byte + pixel-exact
#              gates against it, so the configuration we actually release is
#              bit-exact-validated on every merge — without paying LTO's ~2-3x
#              build cost on PRs. Separate ccache namespace + artifact prefix
#              (…-lto-…) so they never perturb the fast PR build or its seed.
#   publish : RELEASE-ONLY (if: github.event_name == 'release'). Uploads the
#              SHIPPED wheels to PyPI via trusted publishing (OIDC, no stored
#              token) — the LTO Linux wheel (build-lto) plus the optimized macOS +
#              Windows wheels (build-other-os) — gated on the LTO bit-exact +
#              pixel-exact legs being green. Wheels-only (fvtk_backend has no sdist).
name: CI

on:
  # Runs on merges to main too, so each main build refreshes the per-leg ccache
  # seed that PR builds restore (the "cold≈warm" lever). PR builds restore the
  # most recent seed via restore-keys; this push build saves a new one.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Cutting a GitHub Release fires the release-gated build-lto / *-lto / publish
  # legs (trusted publishing is pinned to THIS workflow file + the `pypi`
  # environment). See the `publish` job at the bottom.
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build cp312-abi3 (manylinux_2_28)
    # Heavy VTK C++ compile — runs on the Blacksmith 16-vcpu runner when the org/
    # repo variable FVTK_RUNNER_LINUX is set, else falls back to github-hosted
    # ubuntu-latest. The compile width auto-tracks the runner's cores (no pinned
    # FVTK_BUILD_JOBS — see pyproject), so changing the variable to a bigger/
    # smaller tier is the ONLY knob; nothing here hardcodes a core count.
    runs-on: ${{ vars.FVTK_RUNNER_LINUX || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # VTK derives its version from full history

      # --- ccache cross-RUN SEED (the cold≈warm lever) ------------------------
      # The single Linux abi3 leg keeps ONE container alive for the whole cp
      # matrix, so the in-container /ccache (pyproject linux env) already shares
      # the python-independent C++ across the abi3 dedup WITHIN a run. THIS step
      # adds cross-RUN persistence: restore a per-leg ccache seeded by the most
      # recent push-to-main build (`restore-keys` prefix match). The C++ kit
      # objects are python-independent and byte-stable across commits that don't
      # touch them, so a PR's "cold" build restores the seed and recompiles only
      # its changed TUs (+ the non-cacheable codegen/link floor). `key` is unique
      # per run (github.run_id) so every run SAVES a fresh seed at job end; on
      # push-to-main that becomes the new seed PRs restore. Branch scoping: a PR
      # can read caches from its base branch (main) and its own branch, so the
      # seed naturally comes from main.
      - name: Make ccache dir world-writable (container build user differs)
        run: mkdir -p /tmp/fvtk-cibw-ccache && chmod 0777 /tmp/fvtk-cibw-ccache
      - name: Restore ccache seed (cross-run)
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache
          key: fvtk-ccache-linux-cp312abi3-${{ github.run_id }}
          restore-keys: |
            fvtk-ccache-linux-cp312abi3-

      - name: Build wheel + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          # Single abi3 wheel: cp312-* cp313-* cp314-* all dedup to ONE cp312-abi3
          # build (pyproject `build` selector already restricts to cp312+).
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # PR/push builds are LTO-OFF + -O2 for a fast/cheap BIT-EXACT gate:
          #   FVTK_LTO=0      drops -flto (changes inlining, not FP values).
          #   FVTK_GATE_O2=1  drops the per-TU optimizer from -O3 to -O2 (faster
          #                   codegen; bit-exact — no -ffast-math, so IEEE FP is
          #                   identical at -O2 and -O3). Release builds
          #                   (wheels-cibuildwheel.yml) leave both unset -> -O3 +
          #                   LTO, so shipped wheels stay fully optimized.
          #   FVTK_SOURCE_UNITY=1  per-module source UNITY_BUILD (byte-identical
          #                   objects; GCC>=12-gated, active on this 2_28 image),
          #                   together with the GCC<12-gated wrapper-unity
          #                   (FVTK_WRAP_UNITY, default ON) and the array-TU split.
          CIBW_ENVIRONMENT: FVTK_LTO=0 FVTK_GATE_O2=1 FVTK_SOURCE_UNITY=1
          # Mount the restored host ccache dir into the build container so ccache
          # actually reads/writes the persisted seed (CCACHE_DIR=/ccache is set in
          # pyproject [tool.cibuildwheel.linux.environment]). Without this mount
          # the in-container /ccache is discarded at container exit and the seed is
          # never consulted.
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /tmp/fvtk-cibw-ccache:/ccache"
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-linux-cp312abi3
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-other-os:
    name: build ${{ matrix.os }}
    # macOS/Windows build on EVERY PR (and main + workflow_dispatch). We accept a
    # slower PR gate to never let a non-Linux build break land on main again: a
    # GCC/x86-only construct (e.g. target_clones FMV) compiles clean on the Linux
    # leg but fails AppleClang/MSVC, and a main-only gate caught it only post-merge.
    # Cost is bounded — single cp312-abi3 wheel, one job per OS.
    # runs-on comes from matrix.runner: the Blacksmith macOS (M4) / Windows-2025
    # runner when the FVTK_RUNNER_MACOS / FVTK_RUNNER_WINDOWS variable is set, else
    # the github-hosted default. `os` is kept ONLY as the stable artifact suffix so
    # downstream jobs (publish, bitexact) keep finding fvtk-wheels-macos-14 /
    # fvtk-wheels-windows-latest unchanged. runner.os (Windows/macOS) still drives
    # the per-OS `if:` steps and is correct on Blacksmith runners too.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # One job per non-Linux OS. Each runs the cp312+ abi3 build through
      # cibuildwheel; the backend emits the single cp312-abi3 wheel per OS. All
      # config (archs, init-cache, repair tool, per-OS test-command smoke) lives in
      # pyproject.toml [tool.cibuildwheel.macos|windows]. These legs prove the wheel
      # BUILDS + imports on its native platform; the numeric/pixel gates stay
      # Linux-only (stock vtk==9.6.2 is Linux-only).
      matrix:
        include:
          - os: macos-14
            runner: ${{ vars.FVTK_RUNNER_MACOS || 'macos-14' }}
          - os: windows-latest
            runner: ${{ vars.FVTK_RUNNER_WINDOWS || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Per-OS cross-run ccache (Linux/macOS). The constant build dir + CCACHE_BASEDIR
      # fix make the python-independent C++ a cache hit across runs.
      - name: Restore ccache (cross-run)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache
          key: fvtk-cibw-ccache-${{ matrix.os }}-${{ github.sha }}
          restore-keys: fvtk-cibw-ccache-${{ matrix.os }}-
      # Put MSVC (cl.exe) + the Windows SDK on PATH for the whole job. The Ninja
      # generator does NOT auto-run vcvars, so without this cmake auto-selects the
      # mingw GCC that ships on the windows runner (C:\mingw64\bin\cc.exe) — or
      # finds no cl at all — and fails ("CMAKE_C_COMPILER: cl is not a full path").
      # ci/cmake/windows.cmake pins CMAKE_CXX_COMPILER=cl, so cl must be on PATH.
      - name: Set up MSVC (vcvars) for the Ninja build
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build wheel + smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        # No env here: per-OS config (archs, FVTK_CMAKE_INIT, ccache launcher,
        # test-command) is all in pyproject [tool.cibuildwheel.<os>]. The shipped
        # macOS/Windows wheels stay fully optimized (no FVTK_LTO=0 override).
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  bitexact:
    name: fvtk == stock VTK 9.6.2 (bit-exact, py${{ matrix.python }})
    needs: build
    # Cheap, short gate (~3 min) — the small Blacksmith tier or github fallback.
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        # Both pythons install the one cp312-abi3 wheel -> abi3-aware parity
        # (only type __flags__ diverges; numpy zero-copy preserved).
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          # ONLY the Linux build leg (fvtk-wheels-linux-*); pip --find-links picks
          # the cp312-abi3 wheel (tag-compatible on 3.12 and 3.13). The
          # macOS/Windows artifacts (fvtk-wheels-macos-14 / -windows-latest) are a
          # DISJOINT prefix, so they never reach this Linux gate.
          pattern: fvtk-wheels-linux-*
          merge-multiple: true
          path: dist
      - name: Bit-exact suite (fvtk vs stock VTK 9.6.2)
        # The single abi3 wheel is always tested ABI3-AWARE (BITEXACT_ABI3=1):
        # the heap-type wrappers differ from stock only in type __flags__
        # (HEAPTYPE/IMMUTABLETYPE); every numeric value stays maxULP=0.
        env:
          BITEXACT_ABI3: "1"
        run: ci/run-bitexact.sh dist python
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-output-py${{ matrix.python }}
          path: /tmp/bx-out
          if-no-files-found: ignore

  regression:
    name: fvtk behavior regressions (py${{ matrix.python }})
    needs: build
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        # The one cp312-abi3 wheel is tag-compatible on both interpreters.
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Mesa software GL/EGL (llvmpipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libglx-mesa0 libgles2 libosmesa6 libxcb1
      - uses: actions/download-artifact@v4
        with:
          # ONLY the Linux build leg; pip --find-links picks the cp312-abi3
          # wheel. macOS/Windows artifacts are a disjoint prefix.
          pattern: fvtk-wheels-linux-*
          merge-multiple: true
          path: dist
      - name: Behavior regression suite (built fvtk wheel)
        run: ci/run-regression.sh dist python

  renderexact:
    name: fvtk == stock VTK 9.6.2 (pixel-exact render, py${{ matrix.python }})
    needs: build
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        # The cp312-abi3 wheel on 3.13. Render output is wheel-format-independent
        # (the GL command stream is identical), so a single python is sufficient.
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Mesa software GL/EGL (llvmpipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libglx-mesa0 libgles2 libosmesa6 libxcb1
      - uses: actions/download-artifact@v4
        with:
          pattern: fvtk-wheels-linux-*
          merge-multiple: true
          path: dist
      - name: Pixel-exact render suite (fvtk vs stock VTK 9.6.2, software EGL)
        run: ci/run-renderexact.sh dist python
      - name: Upload render diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renderexact-output-py${{ matrix.python }}
          path: /tmp/rx-out
          if-no-files-found: ignore

  # === LTO-on-main legs (push-to-main / workflow_dispatch ONLY) ==============
  # The PR gate above builds the FAST Linux wheel (FVTK_LTO=0 + -O2) so PRs stay
  # cheap — but that means the configuration we actually SHIP (the tag-gated
  # wheels-cibuildwheel.yml build: -flto + -O3) was never run through the
  # byte-for-byte / pixel-exact gates. These legs close that gap: on merge to
  # main (and manual dispatch) ONLY — never on PRs, so PR latency is untouched —
  # rebuild the Linux wheel exactly as shipped (FVTK_LTO + FVTK_GATE_O2 both
  # UNSET => -flto=auto + -O3, per fvtk-config/minimal.cmake) and re-run both
  # gates against it. LTO/-O3 change inlining + codegen, NOT IEEE FP values (no
  # -ffast-math anywhere), so this is expected to stay maxULP=0 — these legs
  # PROVE it per-merge instead of only at release time.
  build-lto:
    name: build cp312-abi3 LTO (manylinux_2_28, main only)
    if: github.event_name != 'pull_request'
    # Heavy compile + LTO link (64GB on the 16-vcpu tier is ample headroom).
    runs-on: ${{ vars.FVTK_RUNNER_LINUX || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # SEPARATE ccache namespace (…-lto-…) from the non-LTO `build` seed: the
      # -flto/-O3 objects hash differently and must never poison the fast PR seed.
      # The non-LTO `build` job still runs on push-to-main and keeps refreshing
      # the seed that PRs restore, so PR build time is unaffected.
      - name: Make ccache dir world-writable (container build user differs)
        run: mkdir -p /tmp/fvtk-cibw-ccache-lto && chmod 0777 /tmp/fvtk-cibw-ccache-lto
      - name: Restore ccache seed (cross-run, LTO namespace)
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache-lto
          key: fvtk-ccache-linux-cp312abi3-lto-${{ github.run_id }}
          restore-keys: |
            fvtk-ccache-linux-cp312abi3-lto-
      - name: Build LTO wheel + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # Ship config: FVTK_LTO + FVTK_GATE_O2 left UNSET => -flto=auto + -O3
          # (the release default). FVTK_SOURCE_UNITY=1 stays on (byte-identical
          # objects). This is byte-for-byte the wheels-cibuildwheel.yml config.
          CIBW_ENVIRONMENT: FVTK_SOURCE_UNITY=1
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /tmp/fvtk-cibw-ccache-lto:/ccache"
      - uses: actions/upload-artifact@v4
        with:
          # DISTINCT prefix (fvtk-wheels-lto-*) so the non-LTO gates' download
          # pattern (fvtk-wheels-linux-*) never picks up the LTO wheel and the
          # LTO gates below never pick up the fast wheel.
          name: fvtk-wheels-lto-linux-cp312abi3
          path: wheelhouse/*.whl
          if-no-files-found: error

  bitexact-lto:
    name: fvtk == stock VTK 9.6.2 (bit-exact LTO, py${{ matrix.python }})
    if: github.event_name != 'pull_request'
    needs: build-lto
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          pattern: fvtk-wheels-lto-linux-*
          merge-multiple: true
          path: dist
      - name: Bit-exact suite (LTO wheel vs stock VTK 9.6.2)
        env:
          BITEXACT_ABI3: "1"
        run: ci/run-bitexact.sh dist python
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-lto-output-py${{ matrix.python }}
          path: /tmp/bx-out
          if-no-files-found: ignore

  renderexact-lto:
    name: fvtk == stock VTK 9.6.2 (pixel-exact render LTO, py${{ matrix.python }})
    if: github.event_name != 'pull_request'
    needs: build-lto
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Mesa software GL/EGL (llvmpipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libglx-mesa0 libgles2 libosmesa6 libxcb1
      - uses: actions/download-artifact@v4
        with:
          pattern: fvtk-wheels-lto-linux-*
          merge-multiple: true
          path: dist
      - name: Pixel-exact render suite (LTO wheel vs stock VTK 9.6.2, software EGL)
        run: ci/run-renderexact.sh dist python
      - name: Upload render diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renderexact-lto-output-py${{ matrix.python }}
          path: /tmp/rx-out
          if-no-files-found: ignore

  # === Linux aarch64 shipped wheel (every PR + push + release) ===============
  # The manylinux_2_28 aarch64 wheel shipped alongside x86_64. Like build-other-os
  # (macOS/Windows), this is a SINGLE optimized build that runs on every PR — so an
  # aarch64-specific break is caught BEFORE merge, not after — and whose artifact
  # is what `publish` ships. No LTO/non-LTO split (that exists only for x86_64,
  # whose fast wheel feeds the Linux-only bitexact/render gates); aarch64 has no
  # such gates, so one fully-optimized build (FVTK_LTO/FVTK_GATE_O2 unset => -flto
  # + -O3) both validates and ships. Native (not QEMU): the full VTK compile under
  # emulation is prohibitively slow. Runner: the Blacksmith arm64 tier when
  # FVTK_RUNNER_LINUX_ARM64 is set, else github-hosted ubuntu-24.04-arm.
  # cibuildwheel's offscreen smoke (test-command, xvfb) proves the wheel imports
  # and computes on its native platform.
  build-arm:
    name: build cp312-abi3 (manylinux_2_28 aarch64)
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_ARM64 || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Make ccache dir world-writable (container build user differs)
        run: mkdir -p /tmp/fvtk-cibw-ccache-arm && chmod 0777 /tmp/fvtk-cibw-ccache-arm
      - name: Restore ccache seed (cross-run, arm64 namespace)
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache-arm
          key: fvtk-ccache-linux-arm64-cp312abi3-${{ github.run_id }}
          restore-keys: |
            fvtk-ccache-linux-arm64-cp312abi3-
      - name: Build wheel + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # Build aarch64 (overrides the pyproject [tool.cibuildwheel.linux]
          # x86_64 archs/image/repair-plat) on the manylinux_2_28 aarch64 image.
          # Optimized ship config (no FVTK_LTO=0 / FVTK_GATE_O2 override).
          CIBW_ARCHS_LINUX: aarch64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64
          CIBW_ENVIRONMENT: FVTK_SOURCE_UNITY=1
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --strip --plat manylinux_2_28_aarch64 -w {dest_dir} {wheel}"
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /tmp/fvtk-cibw-ccache-arm:/ccache"
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-linux-arm64-cp312abi3
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI (trusted publishing)
    # Only on a published GitHub Release, and only after the SHIPPED-config legs
    # are green: build-lto (the -O3 + LTO Linux x86_64 wheel that ships) validated
    # by bitexact-lto + renderexact-lto, plus the optimized macOS/Windows wheels
    # from build-other-os and the aarch64 wheel from build-arm. The fast non-LTO
    # gate (build/bitexact/renderexact) is not a dependency — its wheel is never
    # published.
    if: github.event_name == 'release'
    needs: [build-lto, build-arm, build-other-os, bitexact-lto, renderexact-lto]
    runs-on: ${{ vars.FVTK_RUNNER_LINUX_SMALL || 'ubuntu-latest' }}
    # Matches the PyPI trusted-publisher configuration (repo pyvista/fvtk,
    # workflow ci.yml, environment pypi). id-token: write mints the short-lived
    # OIDC token PyPI exchanges for an upload token — no API token/secret stored.
    environment:
      name: pypi
      url: https://pypi.org/p/fvtk
    permissions:
      id-token: write
    steps:
      # Collect EXACTLY the four shipped wheels into dist/ (Linux x86_64 + aarch64,
      # macOS, Windows). We pull them by exact artifact name rather than a
      # `fvtk-wheels-*` glob so the non-LTO gate wheel (fvtk-wheels-linux-cp312abi3)
      # — which shares the LTO wheel's filename — can never sneak in and shadow the
      # wheel we mean to ship.
      - name: Download shipped Linux x86_64 (LTO) wheel
        uses: actions/download-artifact@v4
        with:
          name: fvtk-wheels-lto-linux-cp312abi3
          path: dist
      - name: Download shipped Linux aarch64 wheel
        uses: actions/download-artifact@v4
        with:
          name: fvtk-wheels-linux-arm64-cp312abi3
          path: dist
      - name: Download macOS wheel
        uses: actions/download-artifact@v4
        with:
          name: fvtk-wheels-macos-14
          path: dist
      - name: Download Windows wheel
        uses: actions/download-artifact@v4
        with:
          name: fvtk-wheels-windows-latest
          path: dist
      - name: List + sanity-check the release wheels
        run: |
          ls -l dist
          n=$(ls dist/*.whl 2>/dev/null | wc -l)
          echo "collected $n wheel(s)"
          test "$n" -ge 1 || { echo "::error::no wheels to publish"; exit 1; }
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
